<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title>{% block title %} Notification {% endblock %}</title>
    <style>
        body, .body-wrapper {
            font-family: 'Poppins', 'Segoe UI', -apple-system, sans-serif;
            line-height: 1.6;
            background-color: #F0EBFF;
            margin: 0;
            padding: 0;
            width: 100% !important;
        }

        .container {
            max-width: 620px;
            margin: 30px auto;
            background-color: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #E2E8FF;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(53, 168, 240, 0.12);
        }

        .header {
            text-align: center;
            padding: 35px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #FFFFFF;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            margin: 8px 0 0;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .content {
            padding: 30px;
        }

        .text-primary {
	        color: #1A1A2E;
        }

        .text-secondary {
	        color: #4A5568;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.5px;
            color: #FFFFFF !important;
            background-color: #35A8F0;
            box-shadow: 0 8px 24px rgba(53, 168, 240, 0.25);
            margin: 20px 0;
        }

        .btn:hover {
            background-color: #2896D9 !important;
        }

        .btn-secondary {
            background-color: #718096;
        }

        .btn-secondary:hover {
            background-color: #4A5568 !important;
        }

        .section-divider {
            height: 1px;
            background-color: #E2E8FF;
            background: linear-gradient(to right, transparent, #E2E8FF, transparent);
            margin: 25px 0;
        }

        .highlight {
            background-color: #FFF8DC;
            border-left: 4px solid #FFD700;
            padding: 12px 15px;
            border-radius: 6px;
            margin: 15px 0;
        }

        .success-box {
            background-color: #E6FFED;
            border-left: 4px solid #10B981;
            padding: 12px 15px;
            border-radius: 6px;
            margin: 15px 0;
        }

        .alert-box {
            background-color: #FEE2E2;
            border-left: 4px solid #F0354B;
            padding: 12px 15px;
            border-radius: 6px;
            margin: 15px 0;
        }

        .footer {
            text-align: center;
            padding: 24px;
            background-color: #E8E3FF;
            border-top: 1px solid #E2E8FF;
        }

        .footer-text {
            color: #718096;
            font-size: 13px;
            margin: 0;
            line-height: 1.8;
        }

        .footer-text a {
            color: #35A8F0;
            text-decoration: none;
        }

        .info-box {
            background-color: #FAF5FF;
            border: 1px dashed #CBD5FF;
            border-radius: 12px;
            padding: 18px;
            margin: 20px 0;
        }

        .text-center {
            text-align: center;
        }

        .text-link {
            color: #35A8F0;
            text-decoration: none;
        }

        .text-link-danger {
            color: #F0354B;
            text-decoration: none;
        }

        .heading-md {
            font-weight: 600;
            font-size: 18px;
        }

        .heading-sm {
            margin: 5px 0;
            font-weight: 600;
        }

        .list-compact {
            margin: 8px 0 0 0;
            padding-left: 20px;
        }

        .list-compact-sm {
            margin: 8px 0 0 0;
            padding-left: 20px;
            font-size: 13px;
        }

        .m-0 {
            margin: 0;
        }

        .mt-25 {
            margin-top: 25px;
        }

        .mt-20 {
            margin-top: 20px;
        }

        .mt-12 {
            margin-top: 12px;
        }

        .mt-15 {
            margin-top: 15px;
        }

        .m-y-8 {
            margin: 8px 0;
        }

        .m-y-10 {
            margin: 10px 0;
        }

        .m-y-5 {
            margin: 5px 0;
        }

        .small-note {
            font-size: 12px;
        }

        .small-note-11 {
            font-size: 11px;
        }

        .small-note-13 {
            font-size: 13px;
        }

        .code-label {
            margin: 5px 0;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .code-value {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 10px 0;
            font-family: monospace;
        }

        .code-value-primary {
            color: #35A8F0;
        }

        .code-value-purple {
            color: #6610f2;
        }

        .inline-code-link {
            word-break: break-all;
            font-size: 12px;
        }

        .text-14 {
            font-size: 14px;
        }

        .text-18 {
            font-size: 18px;
            font-weight: 600;
            margin: 5px 0;
        }

        .text-36 {
            font-size: 36px;
            font-weight: 700;
            margin: 10px 0;
        }

        .italic {
            font-style: italic;
        }

        .btn-inline {
            margin: 5px;
        }

        .btn-purple {
            background-color: #6610f2;
        }

        .btn-green {
            background-color: #10B981;
        }

        .btn-red {
            background-color: #F0354B;
        }

        .btn-orange {
            background-color: #fd7e14;
        }

        {% block extra_css %}{% endblock %}

        @media (prefers-color-scheme: dark) {
            body, .body-wrapper {
	            background-color: #0F1A2A !important;
            }

            .container {
                background-color: #1E2A3A !important;
                border-color: #2D3748 !important;
                box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4) !important;
            }

            .text-primary {
	            color: #F0F4FF !important;
            }

            .text-secondary {
	            color: #CBD5E0 !important;
            }

            .footer {
                background-color: #1A2536 !important;
                border-top-color: #2D3748 !important;
            }

            .footer-text {
	            color: #8A9BB0 !important;
            }

            .info-box {
                background-color: #1A2536 !important;
                border-color: #4A5568 !important;
            }

            .btn {
	            background-color: #4FB8FF !important;
            }

            .highlight {
                background-color: #332701 !important;
                border-left-color: #FFA500 !important;
            }

            .success-box {
                background-color: #064E3B !important;
                border-left-color: #10B981 !important;
            }

            .alert-box {
                background-color: #5A1D1D !important;
                border-left-color: #F87171 !important;
            }

            .section-divider {
                background-color: #4A5568 !important;
                background: linear-gradient(to right, transparent, #4A5568, transparent) !important;
            }
        }
    </style>
</head>
<body class="body-wrapper">
    <div class="body-wrapper">
        <div class="container">
            <div class="header" style="{% block header_bg %}background-color: #35A8F0; background: linear-gradient(135deg, #35A8F0 0%, #7FDBFF 100%);{% endblock %}">
                <h1>{% block header_title %}{{ project_name }}{% endblock %}</h1>
                <p>{% block header_subtitle %}{% endblock %}</p>
            </div>

            <div class="content">
                {% block content %}{% endblock %}
            </div>

            <div class="footer">
                <p class="footer-text">Happy Gaming<br>The {{ project_name }} Team</p>
                <p class="footer-text mt-20 small-note-11">Need help? Contact us at {{ support_email }}</p>
            </div>
        </div>
    </div>
</body>
</html>
