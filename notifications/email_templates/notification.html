<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .content {
            margin: 20px 0;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            background-color: #007bff;
            color: white;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .category-badge {
            background-color: #6c757d;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin-top: 0;">{{ title }}</h2>
            <span class="badge category-badge">{{ category }}</span>
        </div>

        <div class="content">
            <p>{{ message }}</p>
        </div>

        <div class="footer">
            <p>This is an automated notification from GamiKonnect. Please do not reply to this email.</p>
            <p>
                <a href="{{ site_url }}/notifications/center/">View all notifications</a> | 
                <a href="{{ site_url }}/accounts/settings/">Notification settings</a>
            </p>
            <p>&copy; {% now 'Y' %} GamiKonnect. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
