<div id="changePasswordModal" class="modal">
    <div class="modal-content card-admin p-0 overflow-hidden" style="max-width: 500px; border-left: none;">
        <div class="modal-header bg-light p-4 border-bottom border-light d-flex justify-content-between align-items-center">
            <h3 class="m-0 h5 fw-bold text-dark"><i class="fas fa-lock text-primary me-2"></i> Change Password</h3>
            <button type="button" class="btn-close text-muted" id="closePasswordModalIcon"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body p-4">
            <form id="changePasswordForm">
                {% csrf_token %}
                <input type="hidden" id="change_password_firebase_uid" value="{{ request.session.firebase_uid }}">

                <div class="form-group mb-3">
                    <label class="fw-bold small text-dark mb-1">Current Password</label>
                    <div class="input-group">
                        <input type="password" id="current_password" class="form-control bg-light border-light" required>
                        <button type="button" class="btn btn-light border border-light text-muted modular-toggle-password" data-target="current_password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group mb-3">
                    <label class="fw-bold small text-dark mb-1">New Password</label>
                    <div class="input-group">
                        <input type="password" id="new_password" class="form-control bg-light border-light" required minlength="6">
                        <button type="button" class="btn btn-light border border-light text-muted modular-toggle-password" data-target="new_password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group mb-4">
                    <label class="fw-bold small text-dark mb-1">Confirm New Password</label>
                    <div class="input-group">
                        <input type="password" id="confirm_new_password" class="form-control bg-light border-light" required minlength="6">
                        <button type="button" class="btn btn-light border border-light text-muted modular-toggle-password" data-target="confirm_new_password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="d-flex gap-2 justify-content-end pt-3 border-top border-light">
                    <button type="button" class="btn btn-light border rounded-pill px-4 fw-semibold text-secondary" id="closePasswordModalBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">Update Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
