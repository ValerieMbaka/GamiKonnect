{% load static %}
<div class="profile-completion-container">
    <div class="profile-completion-card">
        <div class="profile-form">
            <form id="profileForm" method="post" enctype="multipart/form-data" data-url="{% url 'accounts:gamer_profile_completion' %}" data-check-username-url="{% url 'accounts:check_username' %}">
                {% csrf_token %}
                <div class="form-section">
                    <label>Avatar <small class="text-muted">(optional)</small></label>
                    <small class="form-text">Upload a profile picture</small>
                    <div class="avatar-upload">
                        <div class="avatar-preview-holder">
                            <img id="avatarPreview" src="{% static 'core/images/player.jpeg' %}" alt="Avatar Preview" class="avatar-preview-image">
                            <div class="avatar-placeholder" id="avatarPlaceholder">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                        <input type="file" name="profile_picture" id="id_profile_picture" accept="image/*">
                        <label for="id_profile_picture" class="avatar-upload-label">
                            <i class="fas fa-camera"></i>
                            <span>Choose Avatar</span>
                        </label>
                    </div>
                </div>

                <div class="form-section">
                    <label>Username <span class="required">*</span></label>
                    <small class="form-text">Choose a unique gaming handle</small>
                    <div class="username-input-group">
                        <input type="text" id="id_custom_username" name="custom_username" value="{{ gamer.custom_username|default:'' }}" required autocomplete="off">
                        <button type="button" class="generate-btn" id="generateUsernameBtn">Generate</button>
                    </div>
                    <div id="custom_username-error" class="error-message"></div>
                </div>

                <div class="form-section">
                    <label>Bio <span class="required">*</span></label>
                    <small class="form-text">A short tagline (5-30 characters)</small>
                    <input type="text" id="id_bio" name="bio" value="{% if gamer.bio != 'Bio' %}{{ gamer.bio }}{% endif %}" placeholder="e.g. FPS Enthusiast" required minlength="5" maxlength="30">
                    <div id="bio-error" class="error-message"></div>
                </div>

                <div class="form-section">
                    <label>About <small class="text-muted">(optional)</small></label>
                    <small class="form-text">Tell the community more about your gaming style</small>
                    <textarea id="id_about" name="about" placeholder="I love strategy games and team play..." minlength="5" maxlength="500">{% if gamer.about != 'About' %}{{ gamer.about }}{% endif %}</textarea>
                    <div class="char-counter" id="aboutCounter">0/500</div>
                    <div id="about-error" class="error-message"></div>
                </div>

                <div class="form-section">
                    <label>Location <span class="required">*</span></label>
                    <small class="form-text">City or region</small>
                    <input type="text" id="id_location" name="location" value="{{ gamer.location|default:'' }}" placeholder="e.g. Nairobi, Kenya" required>
                    <div id="location-error" class="error-message"></div>
                </div>

                <div class="form-section">
                    <label>Date of Birth <span class="required">*</span></label>
                    <div class="date-picker-container">
                        <div class="date-input-group">
                            <select id="dobYear" class="date-select">
                                <option value="">Year</option>
                            </select>
                            <select id="dobMonth" class="date-select">
                                <option value="">Month</option>
                                <option value="1">January</option>
                                <option value="2">February</option>
                                <option value="3">March</option>
                                <option value="4">April</option>
                                <option value="5">May</option>
                                <option value="6">June</option>
                                <option value="7">July</option>
                                <option value="8">August</option>
                                <option value="9">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select>
                            <select id="dobDay" class="date-select">
                                <option value="">Date</option>
                            </select>
                        </div>
                        <input type="hidden" name="date_of_birth" id="id_date_of_birth" value="">
                        <div id="date_of_birth-error" class="error-message"></div>
                    </div>
                </div>

                <div class="form-section">
                    <label>Gaming Platforms <span class="required">*</span></label>
                    <small class="form-text">Select the platforms you game on</small>
                    <div class="chips" id="platformsTags"></div>
                    <input type="hidden" name="platforms" id="id_platforms" value="">
                    <div id="platforms-error" class="error-message"></div>
                </div>

                <div class="form-section">
                    <label>Favorite Games <span class="required">*</span></label>
                    <small class="form-text">Search and select games; Enter adds first match or creates custom.</small>
                    <div class="game-input-section single-column">
                        <input type="text" id="gameInput" placeholder="Search for a game..." class="game-input" autocomplete="off">
                        <div id="gameSuggestionsList" class="game-suggestions" aria-label="Game suggestions"></div>
                    </div>
                    <div class="selected-games-wrapper">
                        <div class="chips" id="gamesTags"></div>
                    </div>
                    <input type="hidden" name="games" id="id_games" value="">
                    <div id="games-error" class="error-message"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="save-btn">Save Details</button>
                </div>
            </form>
        </div>
    </div>
</div>
